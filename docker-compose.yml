services:
  formalizabot-api:
    build: .
    image: formalizabot-mype:latest
    container_name: formalizabot-api
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - db_network
    # Sin "ports": no se publica al host, solo es alcanzable desde otros
    # contenedores en db_network (ej. http://formalizabot-api:8000), la
    # misma red donde corre el contenedor "whatbot".
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  db_network:
    external: true
