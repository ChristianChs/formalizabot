# Fuentes web oficiales para RAG — FormalizaBot MYPE
#
# Recopiladas rastreando manualmente (Chrome, 2026-07-21) a partir de la
# página semilla https://www.gob.pe/269-registrar-o-constituir-una-empresa,
# siguiendo los enlaces internos relevantes al tema de formalización de
# empresas (2-3 niveles de profundidad). Todas son páginas oficiales del
# Estado peruano (gob.pe y subdominios institucionales).
#
# Uso previsto (ver SPEC_MEJORAS_RAG.md, sección 1): `fetch_web_sources.py`
# (aún no implementado) leerá este archivo, descargará cada URL y guardará
# un snapshot versionado en data/normativa_web/<slug>.md.
#
# Campos:
#   url: URL completa a descargar.
#   descripcion: para qué sirve / qué contenido tiene, en español.
#   institucion: entidad responsable (para trazabilidad y tipo_fuente).
#   categoria: agrupación temática (para prioridad de crawling y chunking
#     diferenciado, ver SPEC_MEJORAS_RAG.md sección 2.2).
#
# Licencia de funcionamiento / ITSE (Municipalidad Provincial de Tacna):
# NO está en este YAML. Esas 35 fuentes son PDFs de descarga directa (no
# páginas HTML), así que en vez de un paso de fetch se descargaron ya como
# snapshot local en data/normativa_web/licencia_funcionamiento_tacna/ —
# quedan versionadas en git y listas para indexar sin depender de que la
# web de la Municipalidad esté arriba en el momento de responder (mismo
# criterio de snapshot que propone SPEC_MEJORAS_RAG.md sección 1.2).
# Revisar solapamiento con 03_LICENCIA_DE_FUNCIONAMIENTO_E_ITSE.md y
# 05_TACNA_LICENCIAS_Y_FORMATOS_OFICIALES.md (data/normativa/) antes de
# indexar ambos, para no duplicar contenido en el vectorstore.

