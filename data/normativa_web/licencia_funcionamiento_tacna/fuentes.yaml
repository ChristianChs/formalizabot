# Manifiesto de metadata para los PDFs de esta carpeta.
#
# Son descargas directas de PDF (no páginas HTML), así que a diferencia de
# data/fuentes_web.yaml (que alimenta el futuro fetch_web_sources.py para
# páginas HTML con snapshot en Markdown) estos archivos son binarios sin
# front-matter posible. app/rag/loader.py (_cargar_manifiesto) lee este
# archivo y usa la entrada de cada nombre_archivo para poblar
# url/institucion/fecha_captura/tipo_fuente en la metadata del documento
# cargado. Ver SPEC_MEJORAS_RAG.md sección 1.4.
